name: Android CI

# Se ejecutará cada vez que hagas push o un pull request a estas ramas
on:
  push:
    branches: [ "main", "diseno-final" ]
  pull_request:
    branches: [ "main", "diseno-final" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura Java 17 (Estándar para Android moderno)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Configura caché de Gradle para que sea más rápido
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Da permisos de ejecución al Wrapper de Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Comprueba el estilo de código y errores básicos (Lint)
      - name: Run Android Lint
        run: ./gradlew lintDebug

      # 6. Ejecuta las pruebas unitarias
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # 7. Construye el APK de la app
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 8. (Opcional) Sube el APK generado para que lo puedas descargar desde GitHub
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PopCorn-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
